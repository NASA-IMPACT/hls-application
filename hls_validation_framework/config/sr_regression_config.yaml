# =============================================================================
# HLS Surface Reflectance Acceptance Test Configuration
# =============================================================================
# Used by: notebooks/HLS_SR_acceptance_test.ipynb
# Purpose: Determine whether a new HLS container produces SR and VI outputs
#          that are numerically equivalent to a reference container (prod).
#
# The notebook compares all .tif band files between two S3 prefixes, computes
# per-file difference metrics, and applies statistical tests (Wilcoxon signed-
# rank + permutation test) to derive a per-band and overall Pass / Fail verdict.
#
# No user-defined numerical thresholds are required for the statistical tests.
# The optional per-file thresholds below are supplementary checks only.
# =============================================================================

# ── Container builds being compared ──────────────────────────────────────────
# "prod" = reference build  (older / production container)
# "dev"  = candidate build  (new container being tested)

prod_s3_bucket: ""          # TODO: e.g. "my-hls-testing-bucket"
prod_s3_prefix: ""          # TODO: e.g. "outputs/exp1/prod/"

dev_s3_bucket:  ""          # TODO: leave blank if same bucket as prod
dev_s3_prefix:  ""          # TODO: e.g. "outputs/exp1/dev/"

# ── AWS settings ──────────────────────────────────────────────────────────────
aws_region: "us-west-2"
# Credentials are read from environment variables (paste from Kion / SSO):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN

# ── Product types to compare ─────────────────────────────────────────────────
product_types:
  - "L30"
  - "S30"
  - "L30_VI"
  - "S30_VI"

# ── Date filter (Julian day YYYYDDD, leave blank for all dates) ───────────────
dates:
  L30:    ""     # e.g. "2026073" to scope to a single date
  S30:    ""
  L30_VI: ""
  S30_VI: ""

# ── Per-file comparison thresholds (optional supplementary checks) ────────────
# All absolute difference values are in physical reflectance / index units
# (DN × 0.0001). Set a value to null to skip that check.
# These thresholds are NOT used for the statistical Pass / Fail in Section 7;
# they are supplementary file-level guards only.
# TODO: update after reviewing baseline experiment results.
thresholds:
  sr:
    max_pct_pixels_changed: null   # e.g. 0.1  (%)
    max_abs_diff_refl:      null   # e.g. 0.0005 reflectance units
    max_pct_of_range:       null   # e.g. 0.01 (%)
  vi:
    max_pct_pixels_changed: null   # e.g. 0.001 (%)
    max_abs_diff_refl:      null   # e.g. 0.005 index units
    max_pct_of_range:       null   # e.g. 0.5  (%)
  all:
    require_identical_filesizes: true

# ── Statistical testing (Section 7) ─────────────────────────────────────────
# These settings drive the Wilcoxon and permutation tests.
# No reference margin is needed — tests are fully data-driven.
statistical_testing:
  alpha:          0.05    # significance level for both tests
  n_permutations: 9999    # resamples for the permutation test

# ── Output directories ────────────────────────────────────────────────────────
output:
  report_dir:              "reports/"    # CSV reports, statistical outputs
  outputs_dir:             "outputs/"   # comparison figures (.png)
  save_comparison_images:  true
  figure_format:           "png"
  figure_dpi:              100
  save_csv:                true
