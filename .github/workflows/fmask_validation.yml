name: HLS Validation Suite

on:
  # Manual trigger — engineering team runs this after each container build
  workflow_dispatch:
    inputs:
      test_type:
        description: "Which test to run"
        required: true
        type: choice
        options:
          - fmask
          - sr
          - both
        default: fmask
      candidate_s3_bucket:
        description: "S3 bucket of the new container output"
        required: true
        default: "hls-science-container-testing-018923174646-us-west-2-an"
      candidate_s3_prefix:
        description: "S3 prefix of the new container output (e.g. outputs/exp2/dev/)"
        required: true
        default: "outputs/exp1-recompile/dev/"
      fmask_version:
        description: "Fmask version label"
        required: false
        default: "Fmask5.0"

  # Auto-trigger when science team updates either config
  push:
    paths:
      - "hls_validation_framework/config/fmask_acceptance_config.yaml"
      - "hls_validation_framework/config/sr_regression_config.yaml"

jobs:
  run-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: hls_validation_framework/environment.yml
          activate-environment: lpdaac_vitals
          auto-activate-base: false

      - name: Install Papermill
        shell: bash -l {0}
        run: pip install papermill

      - name: Override config with workflow inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash -l {0}
        run: |
          python - <<'EOF'
          import yaml

          # Update Fmask config
          fmask_cfg_path = "hls_validation_framework/config/fmask_acceptance_config.yaml"
          with open(fmask_cfg_path) as f:
              fmask_cfg = yaml.safe_load(f)
          fmask_cfg['candidate_s3_bucket'] = "${{ github.event.inputs.candidate_s3_bucket }}"
          fmask_cfg['candidate_s3_prefix'] = "${{ github.event.inputs.candidate_s3_prefix }}"
          fmask_cfg['fmask_version']        = "${{ github.event.inputs.fmask_version }}"
          with open(fmask_cfg_path, 'w') as f:
              yaml.dump(fmask_cfg, f)

          # Update SR config
          sr_cfg_path = "hls_validation_framework/config/sr_regression_config.yaml"
          with open(sr_cfg_path) as f:
              sr_cfg = yaml.safe_load(f)
          sr_cfg['post_s3_bucket'] = "${{ github.event.inputs.candidate_s3_bucket }}"
          sr_cfg['post_s3_prefix'] = "${{ github.event.inputs.candidate_s3_prefix }}"
          with open(sr_cfg_path, 'w') as f:
              yaml.dump(sr_cfg, f)

          print("Configs updated with workflow inputs.")
          EOF

      - name: Run Fmask acceptance test
        if: >
          github.event_name == 'push' ||
          github.event.inputs.test_type == 'fmask' ||
          github.event.inputs.test_type == 'both'
        shell: bash -l {0}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION:    us-west-2
        run: |
          python hls_validation_framework/scripts/run_fmask_validation.py \
            --test fmask \
            --output hls_validation_framework/reports/fmask_ci_${{ github.run_number }}.ipynb

      - name: Run SR regression test
        if: >
          github.event.inputs.test_type == 'sr' ||
          github.event.inputs.test_type == 'both'
        shell: bash -l {0}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION:    us-west-2
        run: |
          python hls_validation_framework/scripts/run_fmask_validation.py \
            --test sr \
            --output hls_validation_framework/reports/sr_ci_${{ github.run_number }}.ipynb

      - name: Convert reports to HTML
        shell: bash -l {0}
        if: always()
        run: |
          for nb in hls_validation_framework/reports/*_ci_${{ github.run_number }}.ipynb; do
            [ -f "$nb" ] && jupyter nbconvert --to html "$nb"
          done

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hls-validation-reports-${{ github.run_number }}
          path: |
            hls_validation_framework/reports/*_ci_${{ github.run_number }}.html
            hls_validation_framework/reports/*_ci_${{ github.run_number }}.ipynb
            hls_validation_framework/reports/*.csv
          retention-days: 90
