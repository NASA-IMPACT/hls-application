name: Fmask Acceptance Test

on:
  # Manual trigger — engineering team runs this after each container build
  workflow_dispatch:
    inputs:
      candidate_s3_bucket:
        description: "S3 bucket of the new container output to test"
        required: true
        default: "hls-science-container-testing-018923174646-us-west-2-an"
      candidate_s3_prefix:
        description: "S3 prefix of the new container output (e.g. outputs/exp2/dev/)"
        required: true
        default: "outputs/exp1-recompile/dev/"
      fmask_version:
        description: "Fmask version label (used in report filename)"
        required: false
        default: "Fmask5.0"

  # Auto-trigger when science team updates the config (e.g. new golden reference)
  push:
    paths:
      - "hls_validation_framework/config/fmask_acceptance_config.yaml"

jobs:
  fmask-acceptance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: hls_validation_framework/environment.yml
          activate-environment: lpdaac_vitals
          auto-activate-base: false

      - name: Install Papermill
        shell: bash -l {0}
        run: pip install papermill

      - name: Override config with workflow inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash -l {0}
        run: |
          python - <<'EOF'
          import yaml
          config_path = "hls_validation_framework/config/fmask_acceptance_config.yaml"
          with open(config_path) as f:
              cfg = yaml.safe_load(f)
          cfg['candidate_s3_bucket'] = "${{ github.event.inputs.candidate_s3_bucket }}"
          cfg['candidate_s3_prefix'] = "${{ github.event.inputs.candidate_s3_prefix }}"
          cfg['fmask_version']       = "${{ github.event.inputs.fmask_version }}"
          with open(config_path, 'w') as f:
              yaml.dump(cfg, f)
          print("Config updated with workflow inputs.")
          EOF

      - name: Run Fmask acceptance test
        shell: bash -l {0}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION:    us-west-2
        run: |
          python hls_validation_framework/scripts/run_fmask_validation.py \
            --config hls_validation_framework/config/fmask_acceptance_config.yaml \
            --output hls_validation_framework/reports/fmask_validation_ci_${{ github.run_number }}.ipynb

      - name: Convert report to HTML
        shell: bash -l {0}
        if: always()
        run: |
          jupyter nbconvert \
            --to html \
            hls_validation_framework/reports/fmask_validation_ci_${{ github.run_number }}.ipynb \
            --output hls_validation_framework/reports/fmask_validation_ci_${{ github.run_number }}.html

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fmask-validation-report-${{ github.run_number }}
          path: |
            hls_validation_framework/reports/fmask_validation_ci_${{ github.run_number }}.html
            hls_validation_framework/reports/fmask_validation_ci_${{ github.run_number }}.ipynb
            hls_validation_framework/reports/*.csv
          retention-days: 90
